<div class="container">
    <h1>GitHub Agent Command Center</h1>

    <form action="/refresh_repos" method="POST">
        <button type="submit" class="btn btn-refresh">🔄 Sync Repo List</button>
    </form>

    <form action="/fetch_issues" method="POST" style="margin-top: 10px;">
        <select name="repository" onchange="this.form.submit()">
            <option>-- Select a Repo to Load Issues --</option>
            {% for repo in repos %}
            <option value="{{ repo }}" {{ 'selected' if repo == selected_repo }}>{{ repo }}</option>
            {% endfor %}
        </select>
    </form>

    <hr>

    <h3>Active Tasks (Bugs & Enhancements)</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Task Title</th>
                <th>Labels</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for issue in issues %}
            <tr>
                <td>#{{ issue.id }}</td>
                <td><strong>{{ issue.title }}</strong></td>
                <td>
                    {% for label in issue.labels %}
                    <span class="badge">{{ label }}</span>
                    {% endfor %}
                </td>
                <td>
                    <form action="/close_issue/{{ issue.id }}" method="POST">
                        <button type="submit" class="btn" style="background:#e74c3c;">Mark Done</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
